name: Build & Release

on:
  push:
    tags:
      - 'v*'        # 推送 v2.0.0 等标签时触发

  workflow_dispatch:  # 支持手动触发

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 检出代码 ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 17 ──────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── Android SDK ──────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Rust 工具链 ─────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      # ── 编译 Rust .so (3 个 ABI) ────────────────────────────
      - name: Build Rust for arm64-v8a
        working-directory: rust
        run: cargo ndk -t aarch64-linux-android build --release -p sz-ffi

      - name: Build Rust for armeabi-v7a
        working-directory: rust
        run: cargo ndk -t armv7-linux-androideabi build --release -p sz-ffi

      - name: Build Rust for x86_64
        working-directory: rust
        run: cargo ndk -t x86_64-linux-android build --release -p sz-ffi

      # ── 复制 .so 到 jniLibs ─────────────────────────────────
      - name: Copy .so to jniLibs
        run: |
          mkdir -p android/app/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86_64}
          cp rust/target/aarch64-linux-android/release/libsz_ffi.so   android/app/src/main/jniLibs/arm64-v8a/
          cp rust/target/armv7-linux-androideabi/release/libsz_ffi.so  android/app/src/main/jniLibs/armeabi-v7a/
          cp rust/target/x86_64-linux-android/release/libsz_ffi.so    android/app/src/main/jniLibs/x86_64/
          echo "=== .so sizes ==="
          ls -lh android/app/src/main/jniLibs/*/libsz_ffi.so

      # ── Rust 测试 ───────────────────────────────────────────
      - name: Rust tests
        working-directory: rust
        run: cargo test --workspace

      # ── Gradle 缓存 ─────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts') }}
          restore-keys: gradle-

      # ── 构建 Release APK ────────────────────────────────────
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      # ── 提取版本号 ──────────────────────────────────────────
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      # ── 上传构建产物 ────────────────────────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SecureZip-${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      # ── 创建 GitHub Release（仅 tag 触发时） ────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: SecureZip ${{ steps.version.outputs.version }}
          draft: false
          generate_release_notes: true
          files: |
            android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
            android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk
            android/app/build/outputs/apk/release/app-x86_64-release.apk
            android/app/build/outputs/apk/release/app-universal-release.apk
