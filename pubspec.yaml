name: secure_zip
description: SecureZip - 安全压缩备份工具
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Material Design 3
  cupertino_icons: ^1.0.6
  
  # 路由
  go_router: ^13.0.0
  
  # 状态管理
  provider: ^6.1.1
  
  # 本地存储
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  
  # 文件选择
  file_picker: ^10.0.0
  
  # 权限管理
  permission_handler: ^11.2.0
  
  # UUID生成
  uuid: ^4.2.2
  
  # 日期格式化
  intl: ^0.19.0
  
  # 标准压缩格式
  archive: ^4.0.4
  
  # Rust FFI桥接
  flutter_rust_bridge: ^2.0.0
  
  # JSON序列化
  json_annotation: ^4.8.1
  pointycastle: ^4.0.0
  cryptography: ^2.9.0
  
  # HTTP请求
  http: ^1.2.0
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  freezed_annotation: ^2.4.1
  ffigen: ^20.1.1

flutter:
  uses-material-design: true
